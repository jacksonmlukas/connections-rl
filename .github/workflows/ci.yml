name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src tests
      - name: Ruff format
        run: ruff format --check src tests
      - name: Mypy
        run: mypy src/connections_rl
        continue-on-error: true
      - name: Tests
        run: pytest -v
      - name: Eval smoke (harness end-to-end, no GPU)
        run: python -m connections_rl.eval.run --smoke
      - name: Release gate (no-op until eval artifacts are committed)
        run: |
          python -m connections_rl.eval.gate \
            --candidate results/grpo/metrics.json --baseline results/sft/metrics.json || test $? -eq 2

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t connections-rl:ci .
